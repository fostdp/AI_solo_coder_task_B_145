server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/fishwash
    username: fishwash
    password: fishwash123
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

jackson:
  date-format: yyyy-MM-dd HH:mm:ss
  time-zone: Asia/Shanghai

fishwash:
  material:
    bronze-standard:
      density: 8500.0
      elastic-modulus: 1.0e11
      poisson-ratio: 0.34
      tin-content-pct: 15.0
    bronze-high-tin:
      density: 8700.0
      elastic-modulus: 0.95e11
      poisson-ratio: 0.33
      tin-content-pct: 20.0
  fluid:
    water-density: 1000.0
    surface-tension: 0.073
    gravity: 9.81
  ale:
    transition-ratio: 0.15
    mesh-distortion-threshold: 0.35
    artificial-viscosity: 0.02
    stability-factor: 0.85
    surface-stability: 0.92
  splash:
    secondary-breakup-threshold: 3.5
    coefficient: 0.65
  alert:
    resonance-drift-warning: 0.05
    resonance-drift-critical: 0.15
    spray-deviation-warning: 0.30
    spray-deviation-critical: 0.50
  friction:
    default-normal-force: 20.0
    default-friction-coefficient: 0.35
    default-velocity: 1.2
    stick-slip-stiffness: 1.0e6
    stick-slip-breakaway-coeff: 0.45
    kinetic-reduction-factor: 0.80
    energy-loss-coefficient: 0.65
    hand-resonance-coupling: 0.38
    handle-diameter-meters: 0.06
    typical-stroke-length-meters: 0.08
    skin-water-film-lubrication: 0.22
  ultrasonic:
    default-frequency: 1.7e6
    default-power-w: 20.0
    default-particle-size-microns: 3.0
    cavitation-threshold: 0.12
    nebulization-efficiency: 0.72
    typical-piezo-thickness-mm: 0.12
    crystal-velocity-mps: 6800.0
    water-vaporization-heat-kj: 2260.0
    acoustic-impedance: 1.5e6
    standing-wave-ratio-ultrasonic: 1.15

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: fishwash-simulation
  prometheus:
    metrics:
      export:
        enabled: true
