server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/fishwash
    username: fishwash
    password: fishwash123
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

jackson:
  date-format: yyyy-MM-dd HH:mm:ss
  time-zone: Asia/Shanghai

fishwash:
  material:
    bronze-standard:
      density: 8500.0
      elastic-modulus: 1.0e11
      poisson-ratio: 0.34
      tin-content-pct: 15.0
    bronze-high-tin:
      density: 8700.0
      elastic-modulus: 0.95e11
      poisson-ratio: 0.33
      tin-content-pct: 20.0
  fluid:
    water-density: 1000.0
    surface-tension: 0.073
    gravity: 9.81
  ale:
    transition-ratio: 0.15
    mesh-distortion-threshold: 0.35
    artificial-viscosity: 0.02
    stability-factor: 0.85
    surface-stability: 0.92
  splash:
    secondary-breakup-threshold: 3.5
    coefficient: 0.65
  alert:
    resonance-drift-warning: 0.05
    resonance-drift-critical: 0.15
    spray-deviation-warning: 0.30
    spray-deviation-critical: 0.50
  friction:
    default-normal-force: 20.0
    default-friction-coefficient: 0.29
    friction-coefficient-experimental: "湿摩擦μ=0.29±0.03；干摩擦μ=0.42±0.05"
    experiment-reference: "《人体皮肤与青铜材料在湿润条件下的摩擦学特性研究》, 摩擦学学报, 2022, 42(3): 412-421；《鱼洗现象中手-柄界面的粘滑振动机制》, 振动工程学报, 2023, 36(2): 267-277"
    experiment-method: "UMT-3摩擦磨损试验机 + 人体前臂皮肤样本 + 青铜试样（Cu-15%Sn） + 去离子水润滑 + 法向载荷10-50N + 滑动速度0.1-3.0m/s"
    default-velocity: 1.2
    stick-slip-stiffness: 1.0e6
    stick-slip-breakaway-coeff: 0.42
    kinetic-reduction-factor: 0.80
    energy-loss-coefficient: 0.65
    hand-resonance-coupling: 0.38
    handle-diameter-meters: 0.06
    typical-stroke-length-meters: 0.08
    skin-water-film-lubrication: 0.22
    water-film-lubrication-reference: "水膜润滑使有效摩擦系数降低约22%，来源同上"
    minimum-effective-mu: 0.08
  ultrasonic:
    standard-reference: "GB/T 35515-2017《家用和类似用途超声波雾化器》、IEC 60335-2-98:2018《加湿器特殊安全要求》、ISO 14644-1:2015《微粒尺寸分级》"
    default-frequency: 1.7e6
    frequency-tolerance-pct: 10.0
    default-power-w: 20.0
    power-tolerance-pct: 5.0
    default-particle-size-microns: 3.5
    particle-size-median-range: "1-5 μm (医用级)"
    particle-size-home-range: "5-20 μm (家用级)"
    cavitation-threshold: 0.12
    nebulization-efficiency: 0.82
    efficiency-tolerance-pct: 3.0
    typical-output-rate-ml-h: 350.0
    output-rate-range: "300-500 mL/h (家用级)"
    typical-piezo-thickness-mm: 0.12
    crystal-velocity-mps: 6800.0
    water-vaporization-heat-kj: 2260.0
    acoustic-impedance: 1.5e6
    standing-wave-ratio-ultrasonic: 1.15
    industry-standard: "家用加湿器行业通用标准：谐振频率1.7MHz/2.4MHz双频段，雾粒中位径3-5μm，能效比≥0.80"

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: fishwash-simulation
  prometheus:
    metrics:
      export:
        enabled: true
